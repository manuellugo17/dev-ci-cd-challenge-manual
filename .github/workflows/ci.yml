name: Pipeline CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:

  pruebas:
    name: Ejecutar Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Instalar Node
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Instalar dependencias
        run: npm ci

      - name: Ejecutar tests
        run: npm test
        env:
          APP_ENV: test

      - name: Guardar logs si falla
        if: failure()
        run: |
          mkdir -p logs
          echo "Test failure" > logs/pipeline_failure.log

      - name: Subir logs
        if: failure()
        uses: actions/upload-artifact@v3
        with:
          name: failure-logs
          path: logs/

  deploy_staging:
    name: Deploy a Staging
    runs-on: self-hosted
    needs: pruebas

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Build imagen
        run: docker build -t dev-cicd-challenge:${{ github.sha }} .

      - name: Test rápido contenedor
        run: |
          docker run -d -p 3099:3001 --name test_container dev-cicd-challenge:${{ github.sha }}
          sleep 5
          curl -f http://localhost:3099/health
          docker rm -f test_container

      - name: Tag staging
        run: docker tag dev-cicd-challenge:${{ github.sha }} dev-cicd-challenge:staging

      - name: Deploy staging
        run: |
          cd ~/challenge/app
          docker compose stop staging || true
          docker compose rm -f staging || true
          docker compose up -d staging

      - name: Health check staging
        run: curl -f http://localhost:3001/health

  deploy_produccion:
    name: Deploy a Producción
    runs-on: self-hosted
    needs: deploy_staging

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Backup imagen actual
        run: docker tag dev-cicd-challenge:production dev-cicd-challenge:rollback || true

      - name: Tag producción
        run: docker tag dev-cicd-challenge:${{ github.sha }} dev-cicd-challenge:production

      - name: Guardar SHA rollback
        run: |
          mkdir -p ~/challenge/app/rollback
          echo "${{ github.sha }}" > ~/challenge/app/rollback/last-sha.txt

      - name: Deploy producción
        run: |
          cd ~/challenge/app
          docker compose stop production || true
          docker compose rm -f production || true
          docker compose up -d production

      - name: Health check producción
        run: |
          sleep 5
          curl -f http://localhost:3002/health

      - name: Rollback si falla
        if: failure()
        run: |
          docker tag dev-cicd-challenge:rollback dev-cicd-challenge:production
          cd ~/challenge/app
          docker compose stop production || true
          docker compose rm -f production || true
          docker compose up -d production

  resolver_ia:
    name: Resolver Incidentes con IA
    runs-on: ubuntu-latest
    if: failure()
    needs: [pruebas, deploy_staging, deploy_produccion]

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Descargar logs
        uses: actions/download-artifact@v3
        with:
          name: failure-logs
          path: logs/

      - name: Ejecutar resolver
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: node scripts/ai-resolver.js

      - name: Subir reporte
        uses: actions/upload-artifact@v3
        with:
          name: incident-report
          path: artifacts/