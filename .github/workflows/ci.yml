name: CI/CD Pipeline

on:
  push:
    branches:
      - main
    tags:
      - 'v*-p'
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-node@v4.3.0
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm test
        env:
          APP_ENV: test

      - name: Save failure logs
        if: failure()
        run: npm test 2>&1 | tee logs/pipeline_failure.log || true

      - uses: actions/upload-artifact@v4.6.2
        if: failure()
        with:
          name: failure-logs
          path: logs/

  build:
    name: Build
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Build image
        run: docker build -t dev-cicd-challenge:${{ github.sha }} .

      - name: Smoke test image
        run: |
          docker run -d --name temp -p 3001:3001 \
            -e APP_ENV=test -e PORT=3001 \
            dev-cicd-challenge:${{ github.sha }}
          for i in $(seq 1 10); do
            sleep 3
            response=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3001/health)
            [ "$response" = "200" ] && break
            echo "Attempt $i failed, retrying..."
          done
          [ "$response" = "200" ] || exit 1
          docker rm -f temp

  deploy-staging:
    name: Deploy staging
    needs: build
    runs-on: self-hosted
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Build and tag staging
        run: docker build -t dev-cicd-challenge-manual:staging .

      - name: Deploy
        run: |
          cd ~/challenge/app
          export STAGING_TAG=main-${{ github.sha }}
          docker compose stop staging-manual || true
          docker compose rm -f staging-manual || true
          docker compose up -d staging-manual

      - name: Smoke test
        run: |
          sleep 5
          response=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3003/health)
          [ "$response" = "200" ] || exit 1

  deploy-production:
    name: Deploy production
    needs: build
    runs-on: self-hosted
    if: startsWith(github.ref, 'refs/tags/v') && endsWith(github.ref, '-p')
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Backup current image
        run: |
          docker tag dev-cicd-challenge-manual:production \
            dev-cicd-challenge-manual:rollback 2>/dev/null || true

      - name: Build and tag production
        run: docker build -t dev-cicd-challenge-manual:production .

      - name: Deploy
        run: |
          cd ~/challenge/app
          export PROD_TAG=${{ github.ref_name }}
          docker compose stop production-manual || true
          docker compose rm -f production-manual || true
          docker compose up -d production-manual
          echo ${{ github.ref_name }} > ~/challenge/app/rollback/last-tag.txt

      - name: Health check
        run: |
          sleep 5
          response=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3004/health)
          [ "$response" = "200" ] || exit 1

      - name: Rollback
        if: failure()
        run: |
          docker tag dev-cicd-challenge-manual:rollback \
            dev-cicd-challenge-manual:production 2>/dev/null || true
          cd ~/challenge/app
          docker compose stop production-manual || true
          docker compose rm -f production-manual || true
          docker compose up -d production-manual

  incident-report:
    name: AI Incident Resolver
    needs: [test, build, deploy-staging, deploy-production]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-node@v4.3.0
        with:
          node-version: 20

      - uses: actions/download-artifact@v4.2.1
        with:
          name: failure-logs
          path: logs/
        continue-on-error: true

      - run: node scripts/ai-resolver.js
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - uses: actions/upload-artifact@v4.6.2
        with:
          name: incident-report
          path: artifacts/

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('artifacts/incident_report.md', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## AI Incident Report\n\n${report}`
            });